name: Build and Publish to Binary Cache

on:
  schedule:
    # Run at midnight every day
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      optimize_store:
        description: 'Run garbage collection and store optimization'
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NIX_CACHE_PATH: ${{ github.workspace }}/nix-cache.bin
  NIX_CACHE_URL: file://${{ github.workspace }}/nix-cache.bin?compression=zstd&parallel-compression=true
  CACHE_KEY_FILE: cache-priv-key.pem

jobs:
  update-flake:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      has-changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Nix
        uses: cachix/install-nix-action@51f3067b56fe8ae331890c77d4e454f6d60615ff # v31.10.2
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Update flake.lock
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: nix flake update

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet flake.lock; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload flake.lock artifact
        if: steps.check.outputs.has_changes == 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: flake-lock
          path: flake.lock

  build:
    needs: update-flake
    if: needs.update-flake.outputs.has-changes == 'true'
    strategy:
      matrix:
        include:
          - name: trv4250
            os: macos-15
            config: .#checks.aarch64-darwin.trv4250-build
          - name: tuxedo
            os: ubuntu-latest
            config: .#checks.x86_64-linux.tuxedo-build
    runs-on: ${{ matrix.os }}
    name: Build and Publish ${{ matrix.name }}
    permissions:
      contents: read
    env:
      TARGET_CONFIG: ${{ matrix.config }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download updated flake.lock
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: flake-lock

      - name: Cache Nix sources
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/nix
          key: nix-cache-${{ runner.os }}-${{ hashFiles('flake.lock') }}-${{ github.sha }}-${{ github.run_id }}
          restore-keys: |
            nix-cache-${{ runner.os }}-${{ hashFiles('flake.lock') }}-${{ github.sha }}-
            nix-cache-${{ runner.os }}-${{ hashFiles('flake.lock') }}-
            nix-cache-${{ runner.os }}-

      - name: Cache Nix store
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: '${{ env.NIX_CACHE_PATH }}'
          key: nix-store-${{ runner.os }}-${{ hashFiles('flake.lock') }}-${{ github.sha }}-${{ github.run_id }}
          restore-keys: |
            nix-store-${{ runner.os }}-${{ hashFiles('flake.lock') }}-${{ github.sha }}-
            nix-store-${{ runner.os }}-${{ hashFiles('flake.lock') }}-
            nix-store-${{ runner.os }}-

      - name: Install Nix
        uses: cachix/install-nix-action@51f3067b56fe8ae331890c77d4e454f6d60615ff # v31.10.2
        with:
          install_url: 'https://releases.nixos.org/nix/nix-2.32.4/install'
          extra_nix_config: |
            accept-flake-config = true
            download-buffer-size = 524288000
            secret-key-files = ${{ github.workspace }}/${{ env.CACHE_KEY_FILE }}
            substituters = file://${{ github.workspace }}/nix-cache.bin?trusted=1&want-mass-query=1 https://cache.nixos.org

      - name: Configure Nix for signing
        run: |
          echo '${{ secrets.CACHE_PRIVATE_KEY }}' > '${{ env.CACHE_KEY_FILE }}'
          chmod 600 '${{ env.CACHE_KEY_FILE }}'

      - name: Build target configuration
        run: nix build '${{ env.TARGET_CONFIG }}'

      - name: Collect garbage from Nix store
        if: github.event_name == 'schedule' || inputs.optimize_store
        run: nix-collect-garbage -d

      - name: Optimize Nix store
        if: github.event_name == 'schedule' || inputs.optimize_store
        run: nix store optimise

      - name: Set local binary cache permissions
        run: |
          sudo chown -R $(whoami) '${{ env.NIX_CACHE_PATH }}'

      - name: Update local binary cache
        run: nix copy --to '${{ env.NIX_CACHE_URL }}' '${{ env.TARGET_CONFIG }}'

      - name: Publish to binary cache
        env:
          AWS_ACCESS_KEY_ID: '${{ secrets.AWS_ACCESS_KEY_ID }}'
          AWS_SECRET_ACCESS_KEY: '${{ secrets.AWS_SECRET_ACCESS_KEY }}'
        run: nix copy --to 's3://${{ secrets.CACHE_URL }}' '${{ env.TARGET_CONFIG }}'

      - name: Show storage size
        run: nix path-info --json --all | jq 'map(.narSize) | add'

  commit-flake-update:
    needs: [update-flake, build]
    if: needs.update-flake.outputs.has-changes == 'true'
    runs-on: ubuntu-slim
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ssh-key: '${{ secrets.CI_PUSH_DEPLOY_KEY }}'

      - name: Download updated flake.lock
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: flake-lock

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: 'chore: update flake.lock [skip ci]'
          file_pattern: flake.lock
