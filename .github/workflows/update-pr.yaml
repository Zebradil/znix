name: Update Flake Lock (PR)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  pr:
    uses: ./.github/workflows/nix-update-pr.yaml
    with:
      cache-pull-url: https://znix.zebradil.dev
      cache-public-key: znix.zebradil.dev:nvr0OQFRddbHGopQbyLbLXQnntFBDKp23tqQq+msppw=
      diff-targets: |
        checks.x86_64-linux.tuxedo-build
        checks.aarch64-linux.toddler-build
        checks.aarch64-darwin.trv4250-build
      auto-merge: true
      branch-name: automation/flake-update
      kasha-flake: znix
    secrets:
      ci-app-id: ${{ secrets.CI_APP_ID }}
      ci-app-private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
      cache-signing-key: ${{ secrets.CACHE_PRIVATE_KEY }}
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      cache-s3-url: ${{ secrets.CACHE_URL != '' && format('s3://{0}', secrets.CACHE_URL) || '' }}
