name: Reusable Nix Update

# Reusable workflow that optionally updates flake.lock, discovers and builds
# all flake outputs, pushes them to the binary cache, and optionally commits
# the updated lock file back to the repository.
#
# Jobs:
#   1. update-flake        - (optional) runs `nix flake update` and uploads the new lock file
#   2. discover            - nix-discover.yaml (flake output matrix)
#   3. build               - builds every discovered target, signs and pushes to cache
#   4. commit-flake-update - (optional) commits the updated flake.lock back to the branch
#
# Usage (from another repo):
#   jobs:
#     update:
#       uses: zebradil/znix/.github/workflows/nix-update.yaml@main
#       with:
#         run-flake-update: ${{ github.event_name != 'push' }}
#         auto-commit: ${{ github.event_name != 'push' }}
#         discovery-types: checks
#       secrets:
#         cache-signing-key: ${{ secrets.CACHE_PRIVATE_KEY }}
#         aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
#         aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
#         ci-push-ssh-key: ${{ secrets.CI_PUSH_DEPLOY_KEY }}

on:
  workflow_call:
    inputs:
      run-flake-update:
        description: Run `nix flake update` to refresh flake.lock before building.
        type: boolean
        required: false
        default: true
      auto-commit:
        description: Automatically commit and push the updated flake.lock after a successful build.
        type: boolean
        required: false
        default: true
      discovery-types:
        description: Newline-separated list of flake output types to discover.
        type: string
        required: false
        default: |
          nixosConfigurations
          darwinConfigurations
          devShells
      runner-mapping:
        description: >
          Newline-separated list of Nix system to GitHub Actions runner label mappings.
        type: string
        required: false
        default: |
          x86_64-linux:ubuntu-latest
          aarch64-darwin:macos-15
      attr-filter:
        description: Optional regex to filter discovered attributes.
        type: string
        required: false
        default: ''
      cache-pull-url:
        description: HTTPS URL of the remote Nix binary cache used as an extra substituter.
        type: string
        required: false
        default: ''
      cache-public-key:
        description: Trusted public key for the remote binary cache.
        type: string
        required: false
        default: ''
      cache-s3-url:
        description: S3 URL for `nix copy --to` (e.g. s3://my-bucket?region=eu-central-1).
        type: string
        required: false
        default: ''
      nix-infra-ref:
        description: Git ref of zebradil/znix to use for CI actions and scripts.
        type: string
        required: false
        default: main
    secrets:
      cache-signing-key:
        description: Nix binary cache signing private key.
        required: false
      aws-access-key-id:
        description: AWS access key ID for S3 cache push.
        required: false
      aws-secret-access-key:
        description: AWS secret access key for S3 cache push.
        required: false
      ci-push-ssh-key:
        description: SSH deploy key for committing the updated flake.lock back to the branch.
        required: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-flake:
    if: ${{ inputs.run-flake-update }}
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Checkout znix CI tooling
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: zebradil/znix
          ref: ${{ inputs.nix-infra-ref }}
          path: .znix-ci
          sparse-checkout: .github

      - name: Setup Nix
        uses: ./.znix-ci/.github/actions/setup-nix
        with:
          extra-substituters: ${{ inputs.cache-pull-url }}
          extra-trusted-public-keys: ${{ inputs.cache-public-key }}

      - name: Update flake.lock
        run: nix flake update

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet flake.lock; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload flake.lock artifact
        if: ${{ steps.check.outputs.has_changes == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flake-lock
          path: flake.lock

  discover:
    uses: ./.github/workflows/nix-discover.yaml
    with:
      nix-infra-ref: ${{ inputs.nix-infra-ref }}
      discovery-types: ${{ inputs.discovery-types }}
      runner-mapping: ${{ inputs.runner-mapping }}
      attr-filter: ${{ inputs.attr-filter }}

  build:
    needs:
      - update-flake
      - discover
    if: ${{ !failure() && !cancelled() && needs.discover.outputs.has-targets == 'true' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Checkout znix CI tooling
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: zebradil/znix
          ref: ${{ inputs.nix-infra-ref }}
          path: .znix-ci
          sparse-checkout: .github

      - name: Download updated flake.lock
        if: ${{ needs.update-flake.result == 'success' && needs.update-flake.outputs.has_changes == 'true' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: flake-lock

      - name: Setup Nix
        id: setup
        uses: ./.znix-ci/.github/actions/setup-nix
        with:
          extra-substituters: ${{ inputs.cache-pull-url }}
          extra-trusted-public-keys: ${{ inputs.cache-public-key }}
          cache-signing-key: ${{ secrets.cache-signing-key }}

      - name: Build target
        run: nix build ".#${{ matrix.attr }}"

      - name: Resolve store path
        id: store-path
        run: |
          {
            echo 'path<<EOF'
            nix path-info ".#${{ matrix.attr }}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Publish built path
        uses: ./.znix-ci/.github/actions/push-nix-cache
        with:
          store-paths: ${{ steps.store-path.outputs.path }}
          signing-key-file: ${{ steps.setup.outputs.signing-key-file }}
          s3-url: ${{ inputs.cache-s3-url }}
          aws-access-key-id: ${{ secrets.aws-access-key-id }}
          aws-secret-access-key: ${{ secrets.aws-secret-access-key }}

      - name: Clean up signing key
        if: ${{ always() && steps.setup.outputs.signing-key-file != '' }}
        run: rm -f '${{ steps.setup.outputs.signing-key-file }}'

  commit-flake-update:
    needs:
      - update-flake
      - discover
      - build
    if: >-
      ${{ always()
          && inputs.run-flake-update
          && inputs.auto-commit
          && needs.update-flake.outputs.has_changes == 'true'
          && (needs.discover.outputs.has-targets != 'true' || needs.build.result == 'success') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ssh-key: ${{ secrets.ci-push-ssh-key }}

      - name: Download updated flake.lock
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: flake-lock

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: 'chore: update flake.lock [skip ci]'
          file_pattern: flake.lock
