name: Reusable Nix Update

# Reusable workflow that optionally updates flake.lock, discovers and builds
# all flake outputs, pushes them to the binary cache, and optionally commits
# the updated lock file back to the repository.
#
# Jobs:
#   1. update-flake        - (optional) runs `nix flake update` and uploads the new lock file
#   2. discover            - nix-discover.yaml (flake output matrix)
#   3. build               - builds every discovered target, signs and pushes to cache
#   4. commit-flake-update - (optional) commits the updated flake.lock back to the branch
#
# Usage (from another repo):
#   jobs:
#     update:
#       uses: zebradil/znix/.github/workflows/nix-update.yaml@main
#       with:
#         run-flake-update: ${{ github.event_name != 'push' }}
#         auto-commit: ${{ github.event_name != 'push' }}
#         discovery-types: checks
#       secrets:
#         sops-age-key: ${{ secrets.SOPS_AGE_KEY }}
#         ci-push-ssh-key: ${{ secrets.CI_PUSH_DEPLOY_KEY }}

on:
  workflow_call:
    inputs:
      run-flake-update:
        description: Run `nix flake update` to refresh flake.lock before building.
        type: boolean
        required: false
        default: true
      auto-commit:
        description: Automatically commit and push the updated flake.lock after a successful build.
        type: boolean
        required: false
        default: true
      discovery-types:
        description: Newline-separated list of flake output types to discover.
        type: string
        required: false
        default: |
          nixosConfigurations
          darwinConfigurations
          devShells
      runner-mapping:
        description: >
          Newline-separated list of Nix system to GitHub Actions runner label mappings.
        type: string
        required: false
        default: |
          x86_64-linux:ubuntu-latest
          aarch64-darwin:macos-26
      attr-filter:
        description: Optional regex to filter discovered attributes.
        type: string
        required: false
        default: ''
      cache-pull-url:
        description: HTTPS URL of the remote Nix binary cache used as an extra substituter.
        type: string
        required: false
        default: ''
      cache-public-key:
        description: Trusted public key for the remote binary cache.
        type: string
        required: false
        default: ''
      cache-secrets-file:
        description: Path to the sops-encrypted cache secrets file decrypted with `sops-age-key`.
        type: string
        required: false
        default: secrets/cache.yaml
      nix-infra-ref:
        description: Git ref of zebradil/znix to use for CI actions and scripts.
        type: string
        required: false
        default: main
    secrets:
      # Two ways to supply the cache-publishing credentials; pick one.
      #   1. sops-age-key                  - decrypt them from the sops file (single secret).
      #   2. cache-signing-key + aws-* + cache-s3-url - pass them directly (no sops needed).
      # When sops-age-key is set it takes precedence and the direct secrets are ignored.
      sops-age-key:
        description: >
          age private key that can decrypt the sops cache secrets file (signing key, S3 URL,
          AWS credentials). Stored as the SOPS_AGE_KEY repo secret.
        required: false
      cache-signing-key:
        description: Direct-mode Nix signing private key material. Ignored when sops-age-key is set.
        required: false
      cache-s3-url:
        description: Direct-mode S3 URL for `nix copy --to`. Ignored when sops-age-key is set.
        required: false
      aws-access-key-id:
        description: Direct-mode AWS access key ID. Ignored when sops-age-key is set.
        required: false
      aws-secret-access-key:
        description: Direct-mode AWS secret access key. Ignored when sops-age-key is set.
        required: false
      ci-push-ssh-key:
        description: SSH deploy key for committing the updated flake.lock back to the branch.
        required: false

permissions:
  contents: read
  id-token: write

jobs:
  update-flake:
    if: ${{ inputs.run-flake-update }}
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Checkout znix CI tooling
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: zebradil/znix
          ref: ${{ inputs.nix-infra-ref }}
          path: .znix-ci
          sparse-checkout: .github

      - name: Setup Nix
        uses: ./.znix-ci/.github/actions/setup-nix
        with:
          extra-substituters: ${{ inputs.cache-pull-url }}
          extra-trusted-public-keys: ${{ inputs.cache-public-key }}

      - name: Update flake.lock
        run: nix flake update

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet flake.lock; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload flake.lock artifact
        if: ${{ steps.check.outputs.has_changes == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flake-lock
          path: flake.lock

  discover:
    uses: ./.github/workflows/nix-discover.yaml
    with:
      nix-infra-ref: ${{ inputs.nix-infra-ref }}
      discovery-types: ${{ inputs.discovery-types }}
      runner-mapping: ${{ inputs.runner-mapping }}
      attr-filter: ${{ inputs.attr-filter }}

  probe:
    needs:
      - update-flake
      - discover
    if: ${{ !failure() && !cancelled() && needs.discover.outputs.has-targets == 'true' }}
    uses: ./.github/workflows/nix-probe.yaml
    with:
      matrix: ${{ needs.discover.outputs.matrix }}
      cache-pull-url: ${{ inputs.cache-pull-url }}
      cache-public-key: ${{ inputs.cache-public-key }}
      nix-infra-ref: ${{ inputs.nix-infra-ref }}
      # Download the post-update lock so we probe the new store paths, not the old ones.
      lock-artifact:
        ${{ needs.update-flake.result == 'success' && needs.update-flake.outputs.has_changes == 'true' && 'flake-lock'
        || '' }}

  build:
    needs:
      - update-flake
      - probe
    if: ${{ !failure() && !cancelled() && needs.probe.outputs.has-targets == 'true' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.probe.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Checkout znix CI tooling
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: zebradil/znix
          ref: ${{ inputs.nix-infra-ref }}
          path: .znix-ci
          sparse-checkout: .github

      - name: Download updated flake.lock
        if: ${{ needs.update-flake.result == 'success' && needs.update-flake.outputs.has_changes == 'true' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: flake-lock

      - name: Setup Nix
        id: setup
        uses: ./.znix-ci/.github/actions/setup-nix
        with:
          extra-substituters: ${{ inputs.cache-pull-url }}
          extra-trusted-public-keys: ${{ inputs.cache-public-key }}

      - name: Decrypt cache secrets
        id: cache-secrets
        if: ${{ always() }}
        uses: ./.znix-ci/.github/actions/decrypt-cache-secrets
        with:
          sops-age-key: ${{ secrets.sops-age-key }}
          sops-file: ${{ inputs.cache-secrets-file }}
          signing-key: ${{ secrets.cache-signing-key }}
          s3-url: ${{ secrets.cache-s3-url }}
          aws-access-key-id: ${{ secrets.aws-access-key-id }}
          aws-secret-access-key: ${{ secrets.aws-secret-access-key }}

      - name: Build target
        # --keep-going: don't stop at the first failed dependency so the rest of
        # the closure still gets built and can be pushed to the cache below.
        run: nix build --keep-going ".#${{ matrix.attr }}"

      - name: Resolve built store paths
        id: store-path
        # always(): publish whatever was built even when the build step failed,
        # so a single broken derivation does not force a full rebuild next run.
        if: ${{ always() }}
        run: |
          # The final output may be invalid (build failed), so resolve the whole
          # derivation closure including outputs and keep only the paths that
          # actually exist in the store. nix path-info --derivation instantiates
          # the .drv without building it.
          drv=$(nix path-info --derivation ".#${{ matrix.attr }}" 2>/dev/null || true)
          : > "$RUNNER_TEMP/candidates.txt" "$RUNNER_TEMP/invalid.txt"
          if [[ -n "$drv" ]]; then
            # Build-closure outputs minus the .drv files themselves (we publish
            # built outputs, not derivations).
            nix-store --query --requisites --include-outputs "$drv" \
              | { grep -v '\.drv$' || true; } | sort -u > "$RUNNER_TEMP/candidates.txt"
            # Keep only paths valid in the store. --print-invalid lists the
            # missing ones in a single call, so a partial build still
            # contributes its finished outputs without spawning a process per
            # path.
            xargs -r nix-store --check-validity --print-invalid \
              < "$RUNNER_TEMP/candidates.txt" 2>/dev/null \
              | sort -u > "$RUNNER_TEMP/invalid.txt"
          fi
          # Write the valid paths to a file and export only its path. Large
          # closures (1000s of paths) would otherwise overflow the step env /
          # argument limits when passed inline to the publish action.
          comm -23 "$RUNNER_TEMP/candidates.txt" "$RUNNER_TEMP/invalid.txt" \
            > "$RUNNER_TEMP/store-paths.txt"
          echo "path-file=$RUNNER_TEMP/store-paths.txt" >> "$GITHUB_OUTPUT"

      - name: Publish built path
        if: ${{ always() }}
        uses: ./.znix-ci/.github/actions/push-nix-cache
        with:
          store-paths-file: ${{ steps.store-path.outputs.path-file }}
          signing-key-file: ${{ steps.cache-secrets.outputs.signing-key-file }}
          s3-url: ${{ steps.cache-secrets.outputs.s3-url }}
          aws-access-key-id: ${{ steps.cache-secrets.outputs.aws-access-key-id }}
          aws-secret-access-key: ${{ steps.cache-secrets.outputs.aws-secret-access-key }}

      - name: Clean up signing key
        if: ${{ always() && steps.cache-secrets.outputs.signing-key-file != '' }}
        run: rm -f '${{ steps.cache-secrets.outputs.signing-key-file }}'

  commit-flake-update:
    needs:
      - update-flake
      - discover
      - probe
      - build
    # build is 'skipped' when probe found every target already cached — still a valid,
    # buildable lock, so treat skipped (alongside success) as a pass.
    if: >-
      ${{ always()
          && inputs.run-flake-update
          && inputs.auto-commit
          && needs.update-flake.result == 'success'
          && needs.update-flake.outputs.has_changes == 'true'
          && needs.discover.result == 'success'
          && (needs.probe.result == 'success' || needs.probe.result == 'skipped')
          && (needs.build.result == 'success' || needs.build.result == 'skipped') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ssh-key: ${{ secrets.ci-push-ssh-key }}

      - name: Download updated flake.lock
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: flake-lock

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7.2.0
        with:
          commit_message: 'chore: update flake.lock [skip ci]'
          file_pattern: flake.lock
