name: Reusable Nix CI

# Reusable workflow that discovers, checks, and builds all flake outputs.
#
# Jobs:
#   1. discover  - nix-discover.yaml (flake output matrix)
#   2. check     - runs `nix flake check` and optionally `nix fmt -- --check`
#   3. build     - builds every discovered target on the matching runner,
#                  then signs and pushes the result to the binary cache
#
# Usage (from another repo):
#   jobs:
#     ci:
#       uses: zebradil/znix/.github/workflows/nix-ci.yaml@main
#       with:
#         discovery-types: checks
#         push-to-cache: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
#       secrets:
#         sops-age-key: ${{ secrets.SOPS_AGE_KEY }}

on:
  workflow_call:
    inputs:
      check-flake:
        description: Run `nix flake check` in the check job.
        type: boolean
        required: false
        default: true
      check-formatting:
        description: Run `nix fmt -- --check` in the check job.
        type: boolean
        required: false
        default: false
      push-to-cache:
        description: Sign and push built store paths to the remote cache after each build.
        type: boolean
        required: false
        default: false
      discovery-types:
        description: Newline-separated list of flake output types to discover (e.g. 'checks\nnixosConfigurations').
        type: string
        required: false
        default: |
          nixosConfigurations
          darwinConfigurations
          devShells
      runner-mapping:
        description: >
          Newline-separated list of Nix system to GitHub Actions runner label mappings.
        type: string
        required: false
        default: |
          x86_64-linux:ubuntu-latest
          aarch64-darwin:macos-26
      attr-filter:
        description: Optional regex to filter discovered attributes.
        type: string
        required: false
        default: ''
      cache-pull-url:
        description: HTTPS URL of the remote Nix binary cache used as an extra substituter.
        type: string
        required: false
        default: ''
      cache-public-key:
        description: Trusted public key for the remote binary cache (e.g. 'cache.example.com:AAAA...').
        type: string
        required: false
        default: ''
      cache-secrets-file:
        description: Path to the sops-encrypted cache secrets file decrypted with `sops-age-key`.
        type: string
        required: false
        default: secrets/cache.yaml
      nix-infra-ref:
        description: Git ref of zebradil/znix to use for CI actions and scripts.
        type: string
        required: false
        default: main
    secrets:
      # Two ways to supply the cache-publishing credentials; pick one.
      #   1. sops-age-key                  - decrypt them from the sops file (single secret).
      #   2. cache-signing-key + aws-* + cache-s3-url - pass them directly (no sops needed).
      # When sops-age-key is set it takes precedence and the direct secrets are ignored.
      sops-age-key:
        description: >
          age private key that can decrypt the sops cache secrets file (signing key, S3 URL,
          AWS credentials). Stored as the SOPS_AGE_KEY repo secret.
        required: false
      cache-signing-key:
        description: Direct-mode Nix signing private key material. Ignored when sops-age-key is set.
        required: false
      cache-s3-url:
        description: Direct-mode S3 URL for `nix copy --to`. Ignored when sops-age-key is set.
        required: false
      aws-access-key-id:
        description: Direct-mode AWS access key ID. Ignored when sops-age-key is set.
        required: false
      aws-secret-access-key:
        description: Direct-mode AWS secret access key. Ignored when sops-age-key is set.
        required: false

permissions:
  contents: read
  id-token: write

jobs:
  discover:
    uses: ./.github/workflows/nix-discover.yaml
    with:
      nix-infra-ref: ${{ inputs.nix-infra-ref }}
      discovery-types: ${{ inputs.discovery-types }}
      runner-mapping: ${{ inputs.runner-mapping }}
      attr-filter: ${{ inputs.attr-filter }}

  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Checkout znix CI tooling
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: zebradil/znix
          ref: ${{ inputs.nix-infra-ref }}
          path: .znix-ci
          sparse-checkout: .github

      - name: Setup Nix
        uses: ./.znix-ci/.github/actions/setup-nix
        with:
          extra-substituters: ${{ inputs.cache-pull-url }}
          extra-trusted-public-keys: ${{ inputs.cache-public-key }}

      - name: Check flake
        if: ${{ inputs.check-flake }}
        # --no-build: evaluate checks only. The build job builds every check on its
        # matching runner, so building here too would be redundant work.
        #
        # First instantiate each check's derivation. A check like *-build is a
        # system toplevel whose closure pulls in source paths created on the fly
        # (e.g. home.file sources scoped via builtins.path). `nix flake check
        # --no-build` evaluates a check's outPath for caching but never
        # instantiates it, so under lazy-trees those source paths are known by
        # hash yet never written to the store -> "path '...' is not valid".
        # Evaluating .drvPath instantiates the derivation (no build), which
        # materializes the source closure so the subsequent flake check passes.
        run: |
          system=$(nix eval --raw --impure --expr builtins.currentSystem)
          # Instantiate every check's derivation in a single eval. Forcing each
          # .drvPath materializes the source closure (see comment above); doing it
          # in one `nix eval` reuses the flake evaluation instead of cold-loading
          # it once per check as a per-attr loop would.
          echo "instantiating all checks.${system}.*"
          nix eval --json ".#checks.${system}" \
            --apply 'builtins.mapAttrs (_: c: c.drvPath)' >/dev/null
          nix flake check --no-build

      - name: Verify formatting
        if: ${{ inputs.check-formatting }}
        run: nix fmt -- --check

  probe:
    needs: discover
    if: ${{ needs.discover.outputs.has-targets == 'true' }}
    uses: ./.github/workflows/nix-probe.yaml
    with:
      matrix: ${{ needs.discover.outputs.matrix }}
      cache-pull-url: ${{ inputs.cache-pull-url }}
      cache-public-key: ${{ inputs.cache-public-key }}
      nix-infra-ref: ${{ inputs.nix-infra-ref }}

  build:
    needs:
      - probe
      - check
    if: ${{ needs.probe.outputs.has-targets == 'true' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.probe.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Checkout znix CI tooling
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: zebradil/znix
          ref: ${{ inputs.nix-infra-ref }}
          path: .znix-ci
          sparse-checkout: .github

      - name: Setup Nix
        id: setup
        uses: ./.znix-ci/.github/actions/setup-nix
        with:
          extra-substituters: ${{ inputs.cache-pull-url }}
          extra-trusted-public-keys: ${{ inputs.cache-public-key }}

      - name: Decrypt cache secrets
        id: cache-secrets
        if: ${{ always() && inputs.push-to-cache }}
        uses: ./.znix-ci/.github/actions/decrypt-cache-secrets
        with:
          sops-age-key: ${{ secrets.sops-age-key }}
          sops-file: ${{ inputs.cache-secrets-file }}
          signing-key: ${{ secrets.cache-signing-key }}
          s3-url: ${{ secrets.cache-s3-url }}
          aws-access-key-id: ${{ secrets.aws-access-key-id }}
          aws-secret-access-key: ${{ secrets.aws-secret-access-key }}

      - name: Build target
        # --keep-going: don't stop at the first failed dependency. Building as
        # much of the closure as possible means the successfully built paths can
        # still be pushed to the cache below, so a single broken derivation does
        # not force everything else to be rebuilt on the next run.
        run: nix build --keep-going ".#${{ matrix.attr }}"

      - name: Resolve built store paths
        id: store-path
        # always(): run even when the build step failed so we can still publish
        # whatever was built. Skip the work entirely when not pushing.
        if: ${{ always() && inputs.push-to-cache }}
        run: |
          # The final output may be invalid (build failed), so resolve the whole
          # derivation closure including outputs and keep only the paths that
          # actually exist in the store. nix path-info --derivation instantiates
          # the .drv without building it.
          drv=$(nix path-info --derivation ".#${{ matrix.attr }}" 2>/dev/null || true)
          : > "$RUNNER_TEMP/candidates.txt" "$RUNNER_TEMP/invalid.txt"
          if [[ -n "$drv" ]]; then
            # Build-closure outputs minus the .drv files themselves (we publish
            # built outputs, not derivations).
            nix-store --query --requisites --include-outputs "$drv" \
              | { grep -v '\.drv$' || true; } | sort -u > "$RUNNER_TEMP/candidates.txt"
            # Keep only paths valid in the store. --print-invalid lists the
            # missing ones in a single call, so a partial build still
            # contributes its finished outputs without spawning a process per
            # path.
            xargs -r nix-store --check-validity --print-invalid \
              < "$RUNNER_TEMP/candidates.txt" 2>/dev/null \
              | sort -u > "$RUNNER_TEMP/invalid.txt"
          fi
          # Write the valid paths to a file and export only its path. Large
          # closures (1000s of paths) would otherwise overflow the step env /
          # argument limits when passed inline to the publish action.
          comm -23 "$RUNNER_TEMP/candidates.txt" "$RUNNER_TEMP/invalid.txt" \
            > "$RUNNER_TEMP/store-paths.txt"
          echo "path-file=$RUNNER_TEMP/store-paths.txt" >> "$GITHUB_OUTPUT"

      - name: Publish built path
        if: ${{ always() && inputs.push-to-cache }}
        uses: ./.znix-ci/.github/actions/push-nix-cache
        with:
          store-paths-file: ${{ steps.store-path.outputs.path-file }}
          signing-key-file: ${{ steps.cache-secrets.outputs.signing-key-file }}
          s3-url: ${{ steps.cache-secrets.outputs.s3-url }}
          aws-access-key-id: ${{ steps.cache-secrets.outputs.aws-access-key-id }}
          aws-secret-access-key: ${{ steps.cache-secrets.outputs.aws-secret-access-key }}

      - name: Clean up signing key
        if: ${{ always() && steps.cache-secrets.outputs.signing-key-file != '' }}
        run: rm -f '${{ steps.cache-secrets.outputs.signing-key-file }}'
