name: Push Nix Cache
description: >
  Sign and push built Nix store paths to an S3-backed binary cache. Accepts one or more store paths
  (newline-separated), optionally signs them with a private key, and pushes them to S3 via `nix copy`.
  Each step is skipped when its required inputs are empty.

inputs:
  store-paths-file:
    description: >
      Path to a file containing newline-separated Nix store paths to publish. A file (not the
      inline list) is used so large closures don't overflow the process environment / argument
      limits.
    required: true
  signing-key-file:
    description: >
      Path to the Nix signing key file on disk. Typically the `signing-key-file` output from the
      setup-nix action. Leave empty to skip signing.
    required: false
    default: ''
  s3-url:
    description: >
      S3 URL for `nix copy --to` (e.g. s3://my-cache-bucket or s3://my-bucket?region=eu-central-1).
      Leave empty to skip remote push.
    required: false
    default: ''
  aws-access-key-id:
    description: AWS access key ID for S3 authentication.
    required: false
    default: ''
  aws-secret-access-key:
    description: AWS secret access key for S3 authentication.
    required: false
    default: ''
  kasha-flake:
    description: >
      kasha flake id to publish a root manifest under (roots/<flake>/). Leave empty to skip
      manifest emission — downstream reusers that don't wire kasha stay unaffected.
    required: false
    default: ''
  kasha-emit-script:
    description: Store path of kasha's emit-root-manifest.sh (from `nix eval --raw .#lib.kashaEmitScript`).
    required: false
    default: ''
  roots-file:
    description: >
      File of top-level output paths (roots) for the manifest — NOT the closure. Paired with
      kasha-gen. Required for emission in this (--paths-file) mode.
    required: false
    default: ''
  kasha-gen:
    description: Generation id for the root manifest (roots/<flake>/<gen>.json).
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Sign and push store paths
      shell: bash
      env:
        STORE_PATHS_FILE: ${{ inputs.store-paths-file }}
        CACHE_SIGNING_KEY_FILE: ${{ inputs.signing-key-file }}
        CACHE_S3_URL: ${{ inputs.s3-url }}
        AWS_ACCESS_KEY_ID: ${{ inputs.aws-access-key-id }}
        AWS_SECRET_ACCESS_KEY: ${{ inputs.aws-secret-access-key }}
        KASHA_FLAKE: ${{ inputs.kasha-flake }}
        KASHA_EMIT_SCRIPT: ${{ inputs.kasha-emit-script }}
        KASHA_GEN: ${{ inputs.kasha-gen }}
        ROOTS_FILE: ${{ inputs.roots-file }}
      run: |
        # Shared resolve -> sign -> push core, also used by `nix run .#cache-push`.
        core="$GITHUB_ACTION_PATH/../../scripts/populate-nix-cache.sh"
        args=(--paths-file "$STORE_PATHS_FILE")
        [[ -n "$ROOTS_FILE" ]] && args+=(--roots-file "$ROOTS_FILE")
        if [[ -n "$KASHA_FLAKE" ]]; then
          # emit-root-manifest.sh needs jq + aws; provide them without assuming
          # the runner has them preinstalled (works on ubuntu + macos runners).
          nix shell nixpkgs#awscli2 nixpkgs#jq --command bash "$core" "${args[@]}"
        else
          bash "$core" "${args[@]}"
        fi
