name: Setup Nix
description: >
  Install Nix with optional signing key configuration. Installs Determinate Nix via determinate-nix-action (includes
  FlakeHub Cache authentication) and optionally writes a signing key to disk.

inputs:
  extra-substituters:
    description: Space-separated Nix substituter URLs to add alongside cache.nixos.org.
    required: false
    default: ''
  extra-trusted-public-keys:
    description: Space-separated trusted public keys for the extra substituters.
    required: false
    default: ''
  cache-signing-key:
    description: >
      Nix binary cache signing private key. When set, the key is written to `cache-key-file` so built paths can be
      signed before publishing.
    required: false
    default: ''
  cache-key-file:
    description: >
      Filesystem path where the signing key will be written. Only used when `cache-signing-key` is provided. Defaults to
      `$RUNNER_TEMP/cache-priv-key.pem` when left empty.
    required: false
    default: ''

outputs:
  signing-key-file:
    description: >
      Path to the signing key file on disk, or empty when no signing key was configured. Pass this to push-nix-cache's
      `signing-key-file` input.
    value: ${{ steps.outputs.outputs.signing_key_file }}

runs:
  using: composite
  steps:
    - name: Prepare flake source store
      # A local file-based binary cache that holds only flake input `*-source`
      # paths. It is added as a fast extra substituter (below) and populated by a
      # post-build-hook so the slow `copying path '...-source'` substitutions from
      # the network cache are served from the GitHub Actions cache on later runs.
      #
      # The hook runs inside the Nix daemon, which does not inherit step env vars,
      # so the store directory is baked into the script as a literal. It copies
      # the `-source` members of each build's closure; flake source paths are
      # content-addressed, so they need no signature to be substituted back.
      shell: bash
      run: |
        store="$RUNNER_TEMP/source-cache"
        mkdir -p "$store"
        hook="$RUNNER_TEMP/copy-sources-hook.sh"
        cat > "$hook" <<EOF
        #!/usr/bin/env bash
        # Runs inside the Nix daemon with a minimal PATH, so point at the Nix
        # profile explicitly. A non-zero exit fails the build, so this must never
        # fail: always exit 0 regardless of what the copy does.
        export PATH="/nix/var/nix/profiles/default/bin:\$PATH"
        [ -n "\${OUT_PATHS:-}" ] || exit 0
        srcs=\$(nix-store --query --requisites \$OUT_PATHS 2>/dev/null | grep -E -- '-source\$' | sort -u) || true
        [ -n "\$srcs" ] && nix copy --to "file://$store" \$srcs >/dev/null 2>&1
        exit 0
        EOF
        chmod +x "$hook"

    - name: Install Nix
      uses: DeterminateSystems/determinate-nix-action@2a0be2498974c2b6327e19780488744384637d88 # v3.21.7
      with:
        extra-conf: |
          download-buffer-size = 524288000
          post-build-hook = ${{ runner.temp }}/copy-sources-hook.sh
          extra-substituters = file://${{ runner.temp }}/source-cache ${{ inputs.extra-substituters }}
          extra-trusted-substituters = file://${{ runner.temp }}/source-cache
          extra-trusted-public-keys = ${{ inputs.extra-trusted-public-keys }}

    - name: Cache Nix download artefacts
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ~/.cache/nix
        key: nix-cache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/flake.lock') }}
        restore-keys: |
          nix-cache-${{ runner.os }}-${{ runner.arch }}-

    - name: Cache flake source store paths
      # Restores the file store before the job's Nix work and saves it at post.
      # Keyed on flake.lock; restore-keys lets a lock bump reuse the prior cache
      # and only refill the changed inputs.
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ${{ runner.temp }}/source-cache
        key: nix-source-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/flake.lock') }}
        restore-keys: |
          nix-source-${{ runner.os }}-${{ runner.arch }}-

    - name: Configure Nix signing key
      if: ${{ inputs.cache-signing-key != '' && inputs.cache-signing-key != null }}
      id: key
      shell: bash
      env:
        CACHE_SIGNING_KEY: ${{ inputs.cache-signing-key }}
        CACHE_KEY_FILE_INPUT: ${{ inputs.cache-key-file }}
      run: |
        key_file="${CACHE_KEY_FILE_INPUT:-$RUNNER_TEMP/cache-priv-key.pem}"
        printf '%s' "$CACHE_SIGNING_KEY" > "$key_file"
        chmod 600 "$key_file"
        echo "key_file=$key_file" >> "$GITHUB_OUTPUT"

    - name: Export setup outputs
      id: outputs
      shell: bash
      env:
        CACHE_SIGNING_KEY: ${{ inputs.cache-signing-key }}
        RESOLVED_KEY_FILE: ${{ steps.key.outputs.key_file }}
      run: |
        if [[ -n "$CACHE_SIGNING_KEY" ]]; then
          echo "signing_key_file=$RESOLVED_KEY_FILE" >> "$GITHUB_OUTPUT"
        else
          echo "signing_key_file=" >> "$GITHUB_OUTPUT"
        fi
