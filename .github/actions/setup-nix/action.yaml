name: Setup Nix
description: >
  Install Nix with optional signing key configuration. Installs Nix via
  cachix/install-nix-action and optionally writes a signing key to disk.

inputs:
  extra-substituters:
    description: Space-separated Nix substituter URLs to add alongside cache.nixos.org.
    required: false
    default: ''
  extra-trusted-public-keys:
    description: Space-separated trusted public keys for the extra substituters.
    required: false
    default: ''
  cache-signing-key:
    description: >
      Nix binary cache signing private key. When set, the key is written to
      `cache-key-file` so built paths can be signed before publishing.
    required: false
    default: ''
  cache-key-file:
    description: >
      Filesystem path where the signing key will be written. Only used when `cache-signing-key` is provided.
      Defaults to `$RUNNER_TEMP/cache-priv-key.pem` when left empty.
    required: false
    default: ''

outputs:
  signing-key-file:
    description: >
      Path to the signing key file on disk, or empty when no signing key was configured. Pass this to
      push-nix-cache's `signing-key-file` input.
    value: ${{ steps.outputs.outputs.signing_key_file }}

runs:
  using: composite
  steps:
    - name: Install Nix
      uses: cachix/install-nix-action@ab739621df7a23f52766f9ccc97f38da6b7af14f # v31.10.5
      with:
        extra_nix_config: |
          accept-flake-config = true
          download-buffer-size = 524288000
          substituters = ${{ inputs.extra-substituters }} https://cache.nixos.org https://cache.flakehub.com
          trusted-public-keys = ${{ inputs.extra-trusted-public-keys }} cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= cache.flakehub.com-3:hJuILl5sVK4iKm86JzgdXW12Y2Hwd5G07qKtHTOcDCM= cache.flakehub.com-4:Asi8qIv291s0aYLyH6IOnr5Kf6+OF14WVjkE6t3xMio= cache.flakehub.com-5:zB96CRlL7tiPtzA9/WKyPkp3A2vqxqgdgyTVNGShPDU= cache.flakehub.com-6:W4EGFwAGgBj3he7c5fNh9NkOXw0PUVaxygCVKeuvaqU= cache.flakehub.com-7:mvxJ2DZVHn/kRxlIaxYNMuDG1OvMckZu32um1TadOR8= cache.flakehub.com-8:moO+OVS0mnTjBTcOUh2kYLQEd59ExzyoW1QgQ8XAARQ= cache.flakehub.com-9:wChaSeTI6TeCuV/Sg2513ZIM9i0qJaYsF+lZCXg0J6o= cache.flakehub.com-10:2GqeNlIp6AKp4EF2MVbE1kBOp9iBSyo0UPR9KoR0o1Y=

    - name: Cache Nix download artefacts
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.cache/nix
        key: nix-cache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/flake.lock') }}
        restore-keys: |
          nix-cache-${{ runner.os }}-${{ runner.arch }}-

    - name: Configure Nix signing key
      if: ${{ inputs.cache-signing-key != '' && inputs.cache-signing-key != null }}
      id: key
      shell: bash
      env:
        CACHE_SIGNING_KEY: ${{ inputs.cache-signing-key }}
        CACHE_KEY_FILE_INPUT: ${{ inputs.cache-key-file }}
      run: |
        key_file="${CACHE_KEY_FILE_INPUT:-$RUNNER_TEMP/cache-priv-key.pem}"
        printf '%s' "$CACHE_SIGNING_KEY" > "$key_file"
        chmod 600 "$key_file"
        echo "key_file=$key_file" >> "$GITHUB_OUTPUT"

    - name: Export setup outputs
      id: outputs
      shell: bash
      env:
        CACHE_SIGNING_KEY: ${{ inputs.cache-signing-key }}
        RESOLVED_KEY_FILE: ${{ steps.key.outputs.key_file }}
      run: |
        if [[ -n "$CACHE_SIGNING_KEY" ]]; then
          echo "signing_key_file=$RESOLVED_KEY_FILE" >> "$GITHUB_OUTPUT"
        else
          echo "signing_key_file=" >> "$GITHUB_OUTPUT"
        fi
