name: Setup Nix
description: >
  Install Nix with optional signing key configuration. Installs Determinate Nix via determinate-nix-action (includes
  FlakeHub Cache authentication) and optionally writes a signing key to disk.

inputs:
  extra-substituters:
    description: Space-separated Nix substituter URLs to add alongside cache.nixos.org.
    required: false
    default: ''
  extra-trusted-public-keys:
    description: Space-separated trusted public keys for the extra substituters.
    required: false
    default: ''
  cache-signing-key:
    description: >
      Nix binary cache signing private key. When set, the key is written to `cache-key-file` so built paths can be
      signed before publishing.
    required: false
    default: ''
  cache-key-file:
    description: >
      Filesystem path where the signing key will be written. Only used when `cache-signing-key` is provided. Defaults to
      `$RUNNER_TEMP/cache-priv-key.pem` when left empty.
    required: false
    default: ''

outputs:
  signing-key-file:
    description: >
      Path to the signing key file on disk, or empty when no signing key was configured. Pass this to push-nix-cache's
      `signing-key-file` input.
    value: ${{ steps.outputs.outputs.signing_key_file }}

runs:
  using: composite
  steps:
    - name: Install Nix
      uses: DeterminateSystems/determinate-nix-action@629b284231c2a82554b724e357e47fc6020833c8 # v3.21.2
      with:
        extra-conf: |
          download-buffer-size = 524288000
          extra-substituters = ${{ inputs.extra-substituters }}
          extra-trusted-public-keys = ${{ inputs.extra-trusted-public-keys }}

    - name: Cache Nix download artefacts
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.cache/nix
        key: nix-cache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/flake.lock') }}
        restore-keys: |
          nix-cache-${{ runner.os }}-${{ runner.arch }}-

    - name: Configure Nix signing key
      if: ${{ inputs.cache-signing-key != '' && inputs.cache-signing-key != null }}
      id: key
      shell: bash
      env:
        CACHE_SIGNING_KEY: ${{ inputs.cache-signing-key }}
        CACHE_KEY_FILE_INPUT: ${{ inputs.cache-key-file }}
      run: |
        key_file="${CACHE_KEY_FILE_INPUT:-$RUNNER_TEMP/cache-priv-key.pem}"
        printf '%s' "$CACHE_SIGNING_KEY" > "$key_file"
        chmod 600 "$key_file"
        echo "key_file=$key_file" >> "$GITHUB_OUTPUT"

    - name: Export setup outputs
      id: outputs
      shell: bash
      env:
        CACHE_SIGNING_KEY: ${{ inputs.cache-signing-key }}
        RESOLVED_KEY_FILE: ${{ steps.key.outputs.key_file }}
      run: |
        if [[ -n "$CACHE_SIGNING_KEY" ]]; then
          echo "signing_key_file=$RESOLVED_KEY_FILE" >> "$GITHUB_OUTPUT"
        else
          echo "signing_key_file=" >> "$GITHUB_OUTPUT"
        fi
