apiVersion: vendir.k14s.io/v1alpha1
kind: Config
directories:
  - path: vendor/mattpocock-skills
    contents:
      # Engineering + productivity skill sets from mattpocock/skills.
      # newRootPath strips the leading "skills/" so the tree lands as
      # vendor/mattpocock-skills/{engineering,productivity}/<skill>/.
      # Update with `vendir sync` (re-resolves ref, rewrites vendir.lock.yml);
      # the synced files are committed, so every update is a reviewable diff.
      - path: .
        git:
          url: https://github.com/mattpocock/skills
          ref: origin/main
        includePaths:
          - skills/engineering/**
          - skills/productivity/**
        excludePaths:
          # Meta-installer that git-clones skills into ~/.claude — conflicts
          # with this declarative, read-only-symlink setup.
          - skills/engineering/setup-matt-pocock-skills/**
          # Category-level READMEs are docs, not skills.
          - skills/**/README.md
        newRootPath: skills

  - path: vendor/caveman
    contents:
      # caveman agent skill set + hooks/plugins from JuliusBrussee/caveman.
      # Consumed by modules/home/{claude,opencode}/caveman.nix via
      # inputs.self + "/vendor/caveman/...". Only the subtrees those modules
      # read are vendored. Update with `vendir sync`; synced files are
      # committed, so every update is a reviewable diff.
      - path: .
        git:
          url: https://github.com/JuliusBrussee/caveman
          ref: origin/main
        includePaths:
          - src/hooks/**
          - src/plugins/**
          - src/rules/**
          - skills/**
          - commands/**
          - agents/**
        excludePaths:
          # Self-installers (`curl … | bash`, fetch hooks from GitHub at
          # runtime). The claude module symlinks all of src/hooks into the
          # profile, so these would land there inert but misleading. The nix
          # config never runs them — only the .js hooks + caveman-statusline.sh.
          - src/hooks/install.*
          - src/hooks/uninstall.*
          - src/hooks/checksums.sha256
          - src/hooks/README.md

  - path: vendor/ponytail
    contents:
      # ponytail "lazy senior dev" mode from DietrichGebert/ponytail. Mirrors the
      # caveman wiring (modules/home/{claude,opencode}/ponytail.nix) but targets
      # code minimisation instead of prose. The opencode plugin resolves its
      # siblings via realpath-relative requires (../../hooks, ../../skills,
      # ../command), so the whole subtree below must stay intact and co-located.
      # Update with `vendir sync`; synced files are committed (reviewable diff).
      - path: .
        git:
          url: https://github.com/DietrichGebert/ponytail
          ref: origin/main
        includePaths:
          - hooks/**
          - skills/**
          - commands/**
          - .opencode/**
        excludePaths:
          # Windows-only statusline; this config is darwin/nixos.
          - hooks/*.ps1
          # Host hook-registration manifests — the nix module writes the Claude
          # hook config itself, so these would land inert but misleading.
          - hooks/claude-codex-hooks.json
          - hooks/copilot-hooks.json
